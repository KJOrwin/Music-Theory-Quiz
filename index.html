<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="src/styles/main.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="src/scripts/main.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <title>Music Theory Test</title>
</head>
<body>
    <div class="row">
        <div class="col-sm-1"></div>
        <div class="col-sm-10 pad center">
            <h1>Music Theory Test</h1>
        </div>
        <div class="col-sm-1"></div>
    </div>
    <div class="row" id="actions">
        <div class="col-sm-3"></div>
        <div class="col-sm-6" id="stave">
            <img class="stave-elements" src="assets/images/clef-sig.png">
            <img class="stave-elements" id="n1" src="assets/images/empty-stave.png">
            <img class="stave-elements" id="n2" src="assets/images/empty-stave.png">
            <img class="stave-elements" id="n3" src="assets/images/empty-stave.png">
            <img class="stave-elements" id="n4" src="assets/images/empty-stave.png">
        </div>
        <div class="col-sm-1 center" style="display: none;">
            <button class="audio-button" onclick="playAudio()">
                <img src="assets/images/audio-icon.png" alt="Play Audio">
            </button>
        </div>
        <div class="col-sm-1 center" style="display: none;">
            <button class="audio-button" onclick="hint()">
                <img src="assets/images/hint-icon.png" alt="Hint">
            </button>
        </div>
        <div class="col-sm-3"></div>
    </div>
    <div class="row">
        <div class="col-sm-1"></div>
        <button class="col-sm-4 start-button" onclick="staveExercise(blank=false)">Create Random Stave</button>
        <div class="col-sm-2"></div>
        <button class="col-sm-4 start-button" onclick="staveExercise(blank=true)">Create Random Audio</button>
        <div class="col-sm-1"></div>
    </div>
    <div class="row">
        <div class="col-sm-1"></div>
        <div id="keyboard" class="col-sm-10 unselectable">
            <div class="note note-white" id="note-c"><p>&darr;C</p></div>
            <div class="note note-white" id="note-d"><p>D</p></div>
            <div class="note note-white" id="note-e"><p>E</p></div>
            <div class="note note-white" id="note-f"><p>F</p></div>
            <div class="note note-white" id="note-g"><p>G</p></div>
            <div class="note note-white" id="note-a"><p>A</p></div>
            <div class="note note-white" id="note-b"><p>B</p></div>
            <div class="note note-white" id="note-C"><p>&uarr;C</p></div>
            <div id="black_keys">
                <div class="note note-black" id="note-c#"><p>C#</p></div>
                <div class="note note-black" id="note-eb"><p>Eb</p></div>
                <div class="note note-empty"></div>
                <div class="note note-black" id="note-f#"><p>F#</p></div>
                <div class="note note-black" id="note-ab"><p>Ab</p></div>
                <div class="note note-black" id="note-bb"><p>Bb</p></div>
                <div class="note note-empty"></div>
            </div>
        </div>
        <div class="col-sm-1"></div>
    </div>
    <div class="row grey_text">
        <div class="col-sm-4"></div>
        <div class="col-sm-3">
            <input type="checkbox" id="include_accidentals" name="settings" value="include_accidentals">
            <label for="include_accidentals">Include Accidentals</label><br />
        </div>
        <div class="col-sm-3">
            <input type="checkbox" id="instant_fail" name="settings" value="instant_fail">
            <label for="instant_fail">Instant Fail</label><br/>
        </div>
        <div class="col-sm-4"></div>
    </div>
    <div class="row">
        <div class="col-sm-1"></div>
        <button class="col-sm-2 start-button" onclick="exportFile()">Export Questions</button>
        <div class="col-sm-1"></div>
        <div class="col-sm-4">
            <div class="row">
                <button class="col-sm-12 start-button" onclick="appendQuestion('')">Append Question to File</button>
            </div>
            <div class="row">
                <button class="col-sm-6 start-button" onclick="appendQuestion('stave')">Append Random Stave Question to File</button>
                <button class="col-sm-6 start-button" onclick="appendQuestion('audio')">Append Random Audio Question to File</button>
            </div>  
        </div>
        
        <div class="col-sm-1"></div>
        <input type="file" class="hide" id="real_import" accept=".txt">
        <button class="col-sm-2 start-button" onclick="importFile()">Import Questions</button>
        <div class="col-sm-1"></div>
    </div>
    <div class="row grey_text">
        <div class="col-sm-1"></div>
        <div class="col-sm-10 pad center">
            <h2 id="expimp_message"></h1>
        </div>
        <div class="col-sm-1"></div>
    </div>
    <p id="notes" style="color: lightgrey;"></p>
    <p id="success" style="color: lightgrey;"></p> 
</body>
</html>
